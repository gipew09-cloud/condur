# Поднимает только инфраструктуру: базу данных и Redis.
# Сами боты на этом этапе запускаем руками через Python (так проще отлаживать).
# Команда запуска:  docker compose up -d

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tms
      POSTGRES_PASSWORD: tms_password
      POSTGRES_DB: tms
    ports:
      - "5432:5432"          # пробрасываем наружу, чтобы Python с хоста видел базу
    volumes:
      - pgdata:/var/lib/postgresql/data   # данные не теряются при перезапуске

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
