{% extends "base.html" %}
{% block title %}Карта{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  #map {
    width: 100%;
    height: calc(100vh - 180px);
    min-height: 400px;
    border-radius: 8px;
  }
  @media (max-width: 768px) {
    #map { height: calc(100vh - 140px); border-radius: 0; }
  }
</style>
{% endblock %}

{% block content %}
<h2>📍 Карта водителей</h2>
<p><small>Последние координаты, отправленные через бот. Обновляется раз в минуту.</small></p>
<div id="map"></div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([55.75, 37.62], 5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 18,
  }).addTo(map);

  const markers = {};

  function markerHtml(active) {
    const color = active ? '#2e7d32' : '#9e9e9e';
    return `<div style="background:${color};width:18px;height:18px;border-radius:50%;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);"></div>`;
  }

  function makeIcon(active) {
    return L.divIcon({ className: '', html: markerHtml(active), iconSize: [18,18], iconAnchor: [9,9] });
  }

  async function refresh() {
    try {
      const resp = await fetch('/api/drivers-locations');
      if (!resp.ok) return;
      const data = await resp.json();
      const bounds = L.latLngBounds();
      data.drivers.forEach(d => {
        const latlng = [d.lat, d.lon];
        bounds.extend(latlng);
        const popup = `<b>${d.name}</b><br>${d.active_shift ? '🟢 в смене' : '⚪️ не в смене'}<br><small>${d.updated_at ? new Date(d.updated_at).toLocaleString('ru-RU') : ''}</small>`;
        if (markers[d.driver_id]) {
          markers[d.driver_id].setLatLng(latlng).setIcon(makeIcon(d.active_shift)).setPopupContent(popup);
        } else {
          markers[d.driver_id] = L.marker(latlng, { icon: makeIcon(d.active_shift) }).addTo(map).bindPopup(popup);
        }
      });
      if (data.drivers.length) {
        map.fitBounds(bounds.pad(0.3));
      }
    } catch (e) { console.error(e); }
  }
  refresh();
  setInterval(refresh, 60000);
</script>
{% endblock %}
