<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TMS{% endblock %} — кабинет</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/cabinet.css">
  <link rel="stylesheet" href="/static/mobile.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  {% block head %}{% endblock %}
  <style>
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
    .kpi { background: var(--pico-card-background-color); padding: 1rem; border-radius: 8px; border: 1px solid var(--pico-card-border-color); }
    .kpi small { color: var(--pico-muted-color); display: block; margin-bottom: .25rem; }
    .kpi strong { font-size: 1.6rem; }
    .row-profit { background-color: #e8f5e9; }
    .row-thin   { background-color: #fff8e1; }
    .row-loss   { background-color: #ffebee; }
    /* десктоп: ячейки выравниваем по центру по вертикали, заголовки не переносим */
    @media (min-width: 769px) {
      table th { white-space: nowrap; }
      table td { vertical-align: middle; }
      table .num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
      /* кнопка-ссылка «Изменить» и аналоги — в одну строку */
      table td a[hx-get], table td a[hx-post] { white-space: nowrap; }
      /* inline-форма редактирования занимает строку, лейблы видны */
      .edit-form { display: flex; flex-wrap: wrap; gap: .5rem; align-items: end; margin: 0; }
      .edit-form label { display: flex; flex-direction: column; font-size: .75rem; color: var(--pico-muted-color); margin: 0; min-width: 90px; }
      .edit-form input, .edit-form select { margin: 0; }
      .edit-form button { margin: 0; }
    }
    nav.topbar ul { gap: 1rem; }
    .insights li { margin-bottom: .5rem; }
    .pill { display: inline-block; padding: .15rem .5rem; border-radius: 999px; font-size: .85em; background: var(--pico-secondary-background); }
    .actions { display: flex; gap: .5rem; }
  </style>
</head>
<body>
<header class="container">
  <nav class="topbar">
    <ul>
      <li><strong>{{ owner.company_name or 'TMS' }}</strong></li>
    </ul>
    <ul>
      <li><a href="/" {% if active_page == 'dashboard' %}aria-current="page"{% endif %}>Главная</a></li>
      <li><a href="/trips" {% if active_page == 'trips' %}aria-current="page"{% endif %}>Рейсы</a></li>
      <li><a href="/drivers" {% if active_page == 'drivers' %}aria-current="page"{% endif %}>Водители</a></li>
      <li><a href="/vehicles" {% if active_page == 'vehicles' %}aria-current="page"{% endif %}>Машины</a></li>
      <li><a href="/routes" {% if active_page == 'routes' %}aria-current="page"{% endif %}>Направления</a></li>
      <li><a href="/map" {% if active_page == 'map' %}aria-current="page"{% endif %}>Карта</a></li>
      <li><a href="/finances" {% if active_page == 'finances' %}aria-current="page"{% endif %}>Финансы</a></li>
      <li><a href="/logout">Выйти</a></li>
    </ul>
  </nav>
</header>
<main class="container">
  {% block content %}{% endblock %}
</main>

<nav class="bottom-nav">
  <a href="/" {% if active_page == 'dashboard' %}aria-current="page"{% endif %}><span class="bn-icon">🏠</span>Главная</a>
  <a href="/trips" {% if active_page == 'trips' %}aria-current="page"{% endif %}><span class="bn-icon">🚛</span>Рейсы</a>
  <a href="/drivers" {% if active_page == 'drivers' %}aria-current="page"{% endif %}><span class="bn-icon">👥</span>Люди</a>
  <a href="/map" {% if active_page == 'map' %}aria-current="page"{% endif %}><span class="bn-icon">📍</span>Карта</a>
  <a href="/finances" {% if active_page == 'finances' %}aria-current="page"{% endif %}><span class="bn-icon">💰</span>Деньги</a>
</nav>

{% block scripts %}{% endblock %}
</body>
</html>
