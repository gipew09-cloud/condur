<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход в кабинет</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/cabinet.css">
</head>
<body style="background: var(--bg);">
<main class="container" style="max-width: 440px; margin: 6rem auto;">
  <div class="card" style="padding: 28px 26px;">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:1rem;">
      <span style="width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--navy) 0%,var(--accent) 100%);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;">🚚</span>
      <strong style="font-size:18px; font-weight:800; color:var(--text);">Вход в кабинет</strong>
    </div>
    <div class="page-head" style="margin-bottom:1.25rem;">
      <p class="sub">Откройте бот владельца, отправьте <code>/login</code> — получите 6-значный код.</p>
    </div>
    {% if error %}
      <p style="color: var(--danger-text); font-weight:600;">{{ error }}</p>
    {% endif %}
    <form method="POST" action="/login">
      <label>Telegram ID
        <input type="text" name="telegram_id" inputmode="numeric" required autofocus>
      </label>
      <label>Код (6 цифр)
        <input type="text" name="code" inputmode="numeric" pattern="\d{6}" required>
      </label>
      <button type="submit" style="width:100%;">Войти</button>
    </form>
  </div>
</main>
</body>
</html>
